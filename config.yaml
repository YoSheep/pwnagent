# 报告
report:
  output_dir: "./reports"
  formats:
    - markdown
    - html

# 知识库
knowledge:
  db_path: "./knowledge/db"
  auto_ingest_owasp: true   # 首次运行自动导入 OWASP Top 10

# 数据库
database:
  path: "./db/sessions.db"
