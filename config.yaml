# PentestPilot 配置文件
#
# 密钥建议优先写到仓库根目录的 .env（该文件已被 .gitignore 忽略），
# 也可以直接填在下方各 provider 的 api_key 字段里。
#
# 常用环境变量示例：
# export ANTHROPIC_API_KEY="your-anthropic-key"
# export MINIMAX_API_KEY="your-minimax-key"
# export OPENAI_API_KEY="your-openai-key"
# export GEMINI_API_KEY="your-gemini-key"
# export GROQ_API_KEY="your-groq-key"
# export XAI_API_KEY="your-xai-key"
# export TOGETHER_API_KEY="your-together-key"
# export FIREWORKS_API_KEY="your-fireworks-key"
# export MISTRAL_API_KEY="your-mistral-key"
# export DEEPSEEK_API_KEY="your-deepseek-key"
# export OPENROUTER_API_KEY="your-openrouter-key"
# export MOONSHOT_API_KEY="your-moonshot-key"
# export DASHSCOPE_API_KEY="your-dashscope-key"
# export ZHIPU_API_KEY="your-zhipu-key"
# export SILICONFLOW_API_KEY="your-siliconflow-key"

# 工具路径（留空则自动检测 PATH）
tools:
  nmap: ""       # 留空自动检测，或填绝对路径如 /usr/bin/nmap
  httpx: ""      # projectdiscovery/httpx 二进制路径
  nuclei: ""     # nuclei 二进制路径
  sqlmap: "./third_party/sqlmap/sqlmap.py"     # sqlmap 路径（可填 sqlmap.py / 二进制 / zip）
  sqlmap_auto_init: true                        # Agent 启动时自动初始化 sqlmap（clone/pull）
  sqlmap_repo: "https://github.com/sqlmapproject/sqlmap.git"
  sqlmap_ref: ""                                # 可选：指定分支/标签/commit；留空表示默认分支
  sqlmap_local_dir: "./third_party/sqlmap"      # 自动拉取到本地的目录
  sqlmap_auto_update_interval_hours: 24         # 自动更新最小间隔（小时）

# Agent 行为
agent:
  max_steps: 50
  interactive: true
  verbose: false

# LLM / Provider 配置
llm:
  provider: "minimax_cn"   # 可切换为 anthropic / minimax_cn / minimax_global / openai / gemini / groq / xai / together / fireworks / mistral / deepseek / openrouter / moonshot / dashscope / zhipu / siliconflow / ollama
  timeout: 120
  providers:
    anthropic:
      api_style: "anthropic"
      api_key_env: "ANTHROPIC_API_KEY"
      api_key: ""          # 可直接填 key，但不建议提交到 Git
      base_url: ""         # 官方 Anthropic 留空；代理或中转网关再填写
      models:
        brain: "claude-opus-4-5"
        planner: "claude-sonnet-4-20250514"
        knowledge: "claude-sonnet-4-20250514"
        exploit: "claude-opus-4-5"
        post_exploit: "claude-opus-4-5"

    minimax_cn:
      api_style: "anthropic"
      api_key_env: "MINIMAX_API_KEY"
      api_key: ""          # 中国区 MiniMax key，可写这里，或放到 .env / 环境变量
      base_url: "https://api.minimaxi.com/anthropic"
      models:
        brain: "MiniMax-M2.7"
        planner: "MiniMax-M2.7"
        knowledge: "MiniMax-M2.7"
        exploit: "MiniMax-M2.7"
        post_exploit: "MiniMax-M2.7"

    minimax_global:
      api_style: "anthropic"
      api_key_env: "MINIMAX_API_KEY"
      api_key: ""          # 国际区 MiniMax key，可写这里，或放到 .env / 环境变量
      base_url: "https://api.minimax.io/anthropic"
      models:
        brain: "MiniMax-M2.7"
        planner: "MiniMax-M2.7"
        knowledge: "MiniMax-M2.7"
        exploit: "MiniMax-M2.7"
        post_exploit: "MiniMax-M2.7"

    openai:
      api_style: "openai"
      api_key_env: "OPENAI_API_KEY"
      api_key: ""
      base_url: "https://api.openai.com/v1"
      models:
        brain: "gpt-5"
        planner: "gpt-5-mini"
        knowledge: "gpt-5-mini"
        exploit: "gpt-5"
        post_exploit: "gpt-5"

    gemini:
      api_style: "openai"
      api_key_env: "GEMINI_API_KEY"
      api_key: ""
      base_url: "https://generativelanguage.googleapis.com/v1beta/openai/"
